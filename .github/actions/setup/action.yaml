name: 'Setup'
description: 'Sets up tools, downloads models and runs CI tests'
inputs:
  os:
    description: 'Which OS to test for'
    required: true
  arch:
    description: 'Which architecture to test for'
    required: true
runs:
  using: composite
  steps:
    - name: Install go compiler
      uses: actions/setup-go@v6
      with:
        go-version: '1.22'
    - name: Verify go.mod
      run: "go mod tidy && git diff --exit-code"
      shell: bash
    - name: Run linter
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11
    - name: Setup cmake
      uses: jwlawson/actions-setup-cmake@v2
    - name: Fetch stable-diffusion release (Unix)
      if: ${{ inputs.os == 'unix' }}
      shell: bash
      id: sd_release_unix
      run: echo "file_content=$(cat stable_diffusion.release | head -1)" >> $GITHUB_OUTPUT
    - name: Fetch stable-diffusion release (Windows)
      if: ${{ inputs.os == 'win' }}
      shell: pwsh
      id: sd_release_win
      run: |
        $content = Get-Content stable_diffusion.release -TotalCount 1
        echo "file_content=$content" >> $env:GITHUB_OUTPUT
    - name: Clone stable-diffusion.cpp
      uses: actions/checkout@v4
      with:
        repository: leejet/stable-diffusion.cpp
        submodules: recursive
        ref: ${{ steps.sd_release_unix.outputs.file_content || steps.sd_release_win.outputs.file_content }}
        path: sd
    - name: Build stable-diffusion.cpp (Unix)
      if: ${{ inputs.os == 'unix' }}
      shell: bash
      run: |
        mkdir -p builds/cpu
        cmake -B builds/cpu \
          -G Ninja \
          -DSD_BUILD_SHARED_LIBS=ON \
          -DSD_BUILD_SHARED_GGML_LIB=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DSD_BUILD_EXAMPLES=OFF \
          -DSD_WEBP=OFF \
          -DSD_WEBM=OFF \
          -DGGML_AVX2=ON
        time cmake --build builds/cpu --config Release
      working-directory: ./sd
    - name: Build stable-diffusion.cpp (Windows)
      if: ${{ inputs.os == 'win' }}
      shell: pwsh
      run: |
        mkdir -p builds/cpu
        $cmake_args = @("-B", "builds/cpu",
                        "-G", "Ninja",
                        "-DCMAKE_C_COMPILER=clang-cl",
                        "-DCMAKE_CXX_COMPILER=clang-cl",
                        "-DSD_BUILD_SHARED_LIBS=ON",
                        "-DSD_BUILD_SHARED_GGML_LIB=ON",
                        "-DCMAKE_BUILD_TYPE=Release",
                        "-DSD_BUILD_EXAMPLES=OFF",
                        "-DSD_WEBP=OFF",
                        "-DSD_WEBM=OFF")

        if ("${{ inputs.arch }}" -match "arm") {
          $cmake_args += "-DGGML_AVX2=OFF"
        } else {
          $cmake_args += "-DGGML_AVX2=ON"
        }

        cmake @cmake_args .
        cmake --build builds/cpu --config Release
      working-directory: ./sd
    - name: Fetch stable-diffusion .so root (Unix)
      if: ${{ inputs.os == 'unix' }}
      shell: bash
      run: |
        mv sd/builds/cpu/bin/* .
        rm -rf sd
        echo "GOSD_DYN_LIB=$(realpath .)" >> $GITHUB_ENV
    - name: Fetch stable-diffusion .so root (Windows)
      if: ${{ inputs.os == 'win' }}
      shell: pwsh
      run: |
        Get-ChildItem sd/builds/cpu/bin
        $binPath = "sd/builds/cpu/bin"
        $releasePath = "sd/builds/cpu/bin/Release"

        if (Test-Path "$releasePath/*.dll") {
            # MSBuild-style output
            $source = "$releasePath/*"
        } elseif (Test-Path "$binPath/*.dll") {
            # Ninja-style (flat) output
            $source = "$binPath/*"
        } else {
            Write-Error "Could not find any .dll files in $binPath or $releasePath"
            exit 1
        }

        Move-Item -Path $source -Destination "." -Force
        Remove-Item -Path "sd" -Recurse -Force
        echo "GOSD_DYN_LIB=$((Get-Item .).FullName)" >> $env:GITHUB_ENV
    - name: Setup FFmpeg
      uses: AnimMouse/setup-ffmpeg@v1
    - name: Download test models
      shell: bash
      run: |
        python3 -m venv venv

        if [ ${{ inputs.os }} == "win" ]; then
          VENV_BIN="venv/Scripts"
          else
          VENV_BIN="venv/bin"
        fi

        $VENV_BIN/pip install huggingface_hub requests
        $VENV_BIN/python -u .github/scripts/download_ci_models.py
    - name: Run tests and print coverages (Unix)
      if: ${{ inputs.os == 'unix' }}
      shell: bash
      run: |
        LD_LIBRARY_PATH=$GOSD_DYN_LIB:$LD_LIBRARY_PATH \
        DYLD_LIBRARY_PATH=$GOSD_DYN_LIB:$DYLD_LIBRARY_PATH \
        go test -v -timeout 60m -coverprofile=coverage.out "$(go list ./... | grep -v "examples")"
        go tool cover -func=coverage.out
    - name: Run tests and print coverages (Windows)
      if: ${{ inputs.os == 'win' }}
      shell: pwsh
      run: |
        Set-MpPreference -DisableRealtimeMonitoring $true
        $env:PATH = "$($env:GOSD_DYN_LIB);$env:PATH"
        $packages = go list ./... | Select-String -Pattern "examples" -NotMatch
        go test -v -timeout 60m -coverprofile coverage.out $packages
        if ($LASTEXITCODE) { exit $LASTEXITCODE }
        go tool cover -func coverage.out
