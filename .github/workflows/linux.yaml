name: "Linux"
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**.yaml'
      - 'pkg/gosd/**.go'
      - 'go.mod'
      - 'go.sum'
jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    uses: ./.github/workflows/setup.yaml
    with:
      os: unix
      runner_type: ${{ matrix.runner }}
