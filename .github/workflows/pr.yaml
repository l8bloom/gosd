name: "Test PRs"
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/**.yaml'
      - 'pkg/gosd/**.go'
      - 'go.mod'
      - 'go.sum'
    types:
      - opened
      - synchronize
      - reopened
jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os_name: unix
            runner: ubuntu-24.04
            arch: amd
          - os_name: unix
            runner: ubuntu-24.04-arm
            arch: arm
          - os_name: win
            runner: windows-2022
            arch: amd
          - os_name: win
            runner: windows-11-arm
            arch: arm
          - os_name: unix
            runner: macos-latest
            arch: arm
    uses: ./.github/workflows/setup.yaml
    with:
      os: ${{ matrix.os_name }}
      runner_type: ${{ matrix.runner }}
      arch: ${{ matrix.arch }}
