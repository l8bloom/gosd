name: "Test PRs"
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/**.yaml'
      - 'pkg/gosd/**.go'
      - 'go.mod'
      - 'go.sum'
    types:
      - opened
      - synchronize
      - reopened
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Install go compiler
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: Verify go.mod
        run: "go mod tidy && git diff --exit-code"
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Fetch stable-diffusion release
        id: sd_release
        run: echo "file_content=$(cat stable_diffusion.release)" >> $GITHUB_OUTPUT
      - name: Clone stable-diffusion.cpp
        uses: actions/checkout@v6
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive
          ref: ${{ steps.sd_release.outputs.file_content }}
          path: sd
      - name: Build stable-diffusion.cpp
        run: |
          mkdir -p builds/cpu
          cmake -B builds/cpu `
            -DSD_BUILD_SHARED_LIBS=ON `
            -DSD_BUILD_SHARED_GGML_LIB=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DSD_BUILD_EXAMPLES=OFF `
            -DSD_WEBP=OFF `
            -DSD_WEBM=OFF `
            -DGGML_AVX2=ON .
          cmake --build builds/cpu --config Release -j $env:NUMBER_OF_PROCESSORS
        working-directory: ./sd
      - name: Check Hardware Specs
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "--- WINDOWS HARDWARE INFO ---"
            # Use powershell via bash call
            powershell.exe -Command "
              Write-Host 'CPU Info:'
              Get-CimInstance Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors | Format-List
              Write-Host 'Memory Info (GB):'
              Get-CimInstance Win32_OperatingSystem | Select-Object @{Name='TotalGB';Expression={[math]::round(\$_.TotalVisibleMemorySize/1MB, 2)}}, @{Name='FreeGB';Expression={[math]::round(\$_.FreePhysicalMemory/1MB, 2)}} | Format-List
              Write-Host 'Disk Info (GB):'
              Get-CimInstance Win32_LogicalDisk | Where-Object { \$_.DriveType -eq 3 } | Select-Object DeviceID, @{Name='SizeGB';Expression={[math]::round(\$_.Size/1GB, 2)}}, @{Name='FreeGB';Expression={[math]::round(\$_.FreeSpace/1GB, 2)}} | Format-List
            "
          else
            echo "--- LINUX HARDWARE INFO ---"
            echo "CPU Info:"
            lscpu | grep -E 'Model name|Socket\(s\)|Core\(s\) per socket|Thread\(s\) per core'
            echo -e "\nMemory Info:"
            free -h
            echo -e "\nDisk Info:"
            df -h --total | grep 'total'
          fi
      - name: Fetch stable-diffusion root
        run: |
          Move-Item -Path "sd/builds/cpu/bin/*" -Destination "." -Force
          Remove-Item -Path "sd" -Recurse -Force
          echo "GOSD_DYN_LIB=$((Get-Item .).FullName)" >> $env:GITHUB_ENV
      - name: Install ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
      - name: Verify ffmpeg
        run: |
          ffmpeg -version
      - name: Download test models
        run: |
          Invoke-WebRequest -Uri "https://huggingface.co/unsloth/FLUX.2-klein-4B-GGUF/resolve/main/flux-2-klein-4b-Q4_K_M.gguf?download=true" -OutFile "flux-2-klein-4b-Q4_K_M.gguf"
          Invoke-WebRequest -Uri "https://huggingface.co/ai-toolkit/flux2_vae/resolve/main/ae.safetensors" -OutFile "flux2-ae.safetensors"
          Invoke-WebRequest -Uri "https://huggingface.co/unsloth/Qwen3-4B-GGUF/resolve/main/Qwen3-4B-Q4_K_M.gguf" -OutFile "Qwen3-4B-Q4_K_M.gguf"

          echo "DIFFUSION_MODEL_PATH=$((Get-Item flux-2-klein-4b-Q4_K_M.gguf).FullName)" >> $env:GITHUB_ENV
          echo "VAE_PATH=$((Get-Item flux2-ae.safetensors).FullName)" >> $env:GITHUB_ENV
          echo "LLM_PATH=$((Get-Item Qwen3-4B-Q4_K_M.gguf).FullName)" >> $env:GITHUB_ENV

          Invoke-WebRequest -Uri "https://huggingface.co/QuantStack/Wan2.2-TI2V-5B-GGUF/resolve/main/Wan2.2-TI2V-5B-Q2_K.gguf" -OutFile "Wan2.2-TI2V-5B-Q2_K.gguf"
          Invoke-WebRequest -Uri "https://huggingface.co/Comfy-Org/Wan_2.2_ComfyUI_Repackaged/resolve/main/split_files/vae/wan2.2_vae.safetensors" -OutFile "wan2.2_vae.safetensors"
          Invoke-WebRequest -Uri "https://huggingface.co/city96/umt5-xxl-encoder-gguf/resolve/main/umt5-xxl-encoder-Q3_K_S.gguf" -OutFile "umt5-xxl-encoder-Q3_K_S.gguf"

          echo "VIDEO_DIFFUSION_MODEL_PATH=$((Get-Item Wan2.2-TI2V-5B-Q2_K.gguf).FullName)" >> $env:GITHUB_ENV
          echo "VIDEO_VAE_PATH=$((Get-Item wan2.2_vae.safetensors).FullName)" >> $env:GITHUB_ENV
          echo "VIDEO_T5XXL_PATH=$((Get-Item umt5-xxl-encoder-Q3_K_S.gguf).FullName)" >> $env:GITHUB_ENV
      - name: Run tests and print coverages
        run: |
          $env:PATH = "$($env:GOSD_DYN_LIB);$env:PATH"
          $packages = go list ./... | Select-String -Pattern "examples" -NotMatch
          go test -v -coverprofile coverage.out $packages
          go tool cover -func coverage.out
