name: "Test PRs"
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/**.yaml'
      - 'pkg/gosd/**.go'
      - 'go.mod'
      - 'go.sum'
    types:
      - opened
      - synchronize
      - reopened
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Install go compiler
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: Verify go.mod
        run: "go mod tidy && git diff --exit-code"
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Fetch stable-diffusion release
        id: sd_release
        run: echo "file_content=$(cat stable_diffusion.release)" >> $GITHUB_OUTPUT
      - name: Clone stable-diffusion.cpp
        uses: actions/checkout@v6
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive
          ref: ${{ steps.sd_release.outputs.file_content }}
          path: sd
      - name: Build stable-diffusion.cpp
        run: |
          mkdir -p builds/cpu
          cmake -B builds/cpu \
            -DSD_BUILD_SHARED_LIBS=ON \
            -DSD_BUILD_SHARED_GGML_LIB=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DSD_BUILD_EXAMPLES=OFF \
            -DSD_WEBP=OFF \
            -DSD_WEBM=OFF \
            -DGGML_AVX2=ON
          cmake --build builds\cpu --config Release -j$(nproc)
        working-directory: ./sd
