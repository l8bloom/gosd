name: "Test PRs"
on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  ubuntu-build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Install go compiler
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Verify go.mod
        run: "go mod tidy && git diff --exit-code"
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
