name: "Test PRs"
on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  ubuntu-build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Install go compiler
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Verify go.mod
        run: "go mod tidy && git diff --exit-code"
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Fetch stable-diffusion release
        id: sd_release
        run: echo "file_content=$(cat stable_diffusion.release)" >> $GITHUB_OUTPUT
      - name: Clone stable-diffusion.cpp
        uses: actions/checkout@v6
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive
          ref: ${{ steps.sd_release.outputs.file_content }}
          path: sd
      - name: Build stable-diffusion.cpp
        run: |
          mkdir -p builds/cpu
          cmake -B builds/cpu \
            -DSD_BUILD_SHARED_LIBS=ON \
            -DSD_BUILD_SHARED_GGML_LIB=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DSD_BUILD_EXAMPLES=OFF \
            -DSD_WEBP=OFF \
            -DSD_WEBM=OFF \
            -DGGML_AVX2=ON
          time cmake --build builds/cpu --config Release -j$(nproc)
        working-directory: ./sd
      - name: Fetch stable-diffusion .so root
        run: |
          mv sd/builds/cpu/bin/* .
          rm -rf sd
          echo "GOSD_DYN_LIB=$(realpath .)" >> $GITHUB_ENV
      - name: Run tests
        run: "LD_LIBRARY_PATH=$GOSD_DYN_LIB:$LD_LIBRARY_PATH go test ./..."
      - name: Print coverages
        run: |
          go test ./... -coverprofile=coverage.tmp
          cat coverage.tmp | grep -v "examples/" > coverage.out
          go tool cover -func=coverage.out
